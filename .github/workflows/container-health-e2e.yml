name: container-health-e2e

on:
  schedule:
    - cron: "23 19 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  provider-health:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      UV_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
      VERIFY_SCREENSHOT_DIR: ${{ github.workspace }}/artifacts/test-quality/container-health
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v8
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          uv pip install --python .venv/bin/python -r requirements.txt
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir frontend exec playwright install --with-deps chromium
      - name: Create ephemeral Compose env
        run: |
          compose_env="$RUNNER_TEMP/agent-gov-compose.env"
          cp docker/.env.example "$compose_env"
          printf 'COMPOSE_ENV_FILE=%s\n' "$compose_env" >> "$GITHUB_ENV"
      - name: Real container provider-health acceptance
        run: make container-health-e2e COMPOSE_ENV_FILE="$COMPOSE_ENV_FILE"
      - name: Upload container diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: container-health-${{ github.run_attempt }}
          path: artifacts/test-quality/container-health
          if-no-files-found: error
          retention-days: 30
