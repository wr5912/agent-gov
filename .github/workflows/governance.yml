name: governance

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  governance-static:
    runs-on: ubuntu-latest
    env:
      UV_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          uv pip install --python .venv/bin/python -r requirements.txt

      - name: Static governance, types, and seed safety
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="origin/${{ github.base_ref }}"
          else
            base_ref="HEAD^"
          fi
          make ci-static GOVERNANCE_BASE_REF="$base_ref"

  backend-main-full:
    runs-on: ubuntu-latest
    env:
      UV_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          uv pip install --python .venv/bin/python -r requirements.txt

      - name: Backend full suite
        run: make test-backend

      - name: Upload backend diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-main-full-diagnostics-${{ github.run_attempt }}
          path: artifacts/test-quality/backend-main-full
          if-no-files-found: error
          retention-days: 30

      - name: Upload trusted backend evidence
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: backend-main-full-evidence-${{ github.run_attempt }}
          path: artifacts/test-quality/backend-main-full
          if-no-files-found: error
          retention-days: 30

  frontend-ui:
    runs-on: ubuntu-latest
    env:
      UV_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
      RETRIES: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install backend contract dependencies
        run: |
          uv venv .venv --python 3.11
          uv pip install --python .venv/bin/python -r requirements.txt

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Verify generated API types are fresh (F9：契约边界，前端类型须由 OpenAPI 生成)
        run: |
          pnpm --dir frontend run generate:api-types
          git diff --exit-code frontend/src/types/api.ts \
            || { echo "::error::frontend/src/types/api.ts 与后端 OpenAPI 不同步——请重跑 'pnpm -C frontend generate:api-types' 并提交。"; exit 1; }

      - name: Frontend build
        run: pnpm --dir frontend build

      - name: Install Chromium
        run: pnpm --dir frontend exec playwright install --with-deps chromium

      - name: Verify Playwright runtime
        run: pnpm --dir frontend run verify:playwright-runtime

      - name: Main flow UI states
        run: make main-flow-ui-test

      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-ui-${{ github.run_attempt }}
          path: artifacts/test-quality/frontend-ui
          if-no-files-found: warn
          retention-days: 30

  quality-gate:
    if: always()
    needs:
      - governance-static
      - backend-main-full
      - frontend-ui
    runs-on: ubuntu-latest
    steps:
      - name: Require every blocking lane
        env:
          STATIC_RESULT: ${{ needs.governance-static.result }}
          BACKEND_RESULT: ${{ needs.backend-main-full.result }}
          FRONTEND_RESULT: ${{ needs.frontend-ui.result }}
        run: |
          printf 'governance-static=%s\nbackend-main-full=%s\nfrontend-ui=%s\n' \
            "$STATIC_RESULT" "$BACKEND_RESULT" "$FRONTEND_RESULT"
          test "$STATIC_RESULT" = success
          test "$BACKEND_RESULT" = success
          test "$FRONTEND_RESULT" = success

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install collection and evidence dependencies
        run: |
          uv venv .venv --python 3.11
          uv pip install --python .venv/bin/python -r requirements.txt

      - name: Download trusted backend evidence
        uses: actions/download-artifact@v8
        with:
          name: backend-main-full-evidence-${{ github.run_attempt }}
          path: artifacts/trusted-backend

      - name: Verify same-run complete evidence
        run: |
          .venv/bin/python scripts/check_test_quality_policy.py \
            --policy tests/quality_policy.json \
            --evidence-dir artifacts/trusted-backend \
            --lane main-full \
            --require-clean \
            --expected-job backend-main-full
