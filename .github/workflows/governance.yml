name: governance

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  governance:
    runs-on: ubuntu-latest
    env:
      UV_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          uv pip install --python .venv/bin/python -r requirements.txt pytest

      - name: Governance guard
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="origin/${{ github.base_ref }}"
          else
            base_ref="HEAD^"
          fi
          .venv/bin/python scripts/check_codex_governance.py --mode fail --base-ref "$base_ref"

      - name: Tests
        run: make test

      - name: Runtime volume seeds safety scan (#27：新增/修改 seed 预置 Agent 子树须过脱敏门)
        run: make runtime-volume-seeds-scan

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Verify generated API types are fresh (F9：契约边界，前端类型须由 OpenAPI 生成)
        run: |
          pnpm --dir frontend run generate:api-types
          git diff --exit-code frontend/src/types/api.ts \
            || { echo "::error::frontend/src/types/api.ts 与后端 OpenAPI 不同步——请重跑 'pnpm -C frontend generate:api-types' 并提交。"; exit 1; }

      - name: Frontend build
        run: pnpm --dir frontend build

      - name: Main flow UI states
        run: make main-flow-test
