name: release-live

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release-live
    env:
      UV_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
      MODEL_PROVIDER_API_URL: ${{ secrets.MODEL_PROVIDER_API_URL }}
      MODEL_PROVIDER_API_KEY: ${{ secrets.MODEL_PROVIDER_API_KEY }}
      API_KEY: ${{ secrets.RELEASE_API_KEY }}
      FRONTEND_RUNTIME_API_KEY: ${{ secrets.RELEASE_API_KEY }}
      HOST_RUNTIME_VOLUME_ROOT: ${{ runner.temp }}/agent-gov-live-runtime
      VERIFY_SCREENSHOT_DIR: ${{ github.workspace }}/artifacts/test-quality/release-live
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v8.3.2
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Require protected live configuration
        run: |
          test -n "$MODEL_PROVIDER_API_URL" || { echo "::error::release-live environment lacks MODEL_PROVIDER_API_URL"; exit 1; }
          test -n "$MODEL_PROVIDER_API_KEY" || { echo "::error::release-live environment lacks MODEL_PROVIDER_API_KEY"; exit 1; }
          test -n "$API_KEY" || { echo "::error::release-live environment lacks RELEASE_API_KEY"; exit 1; }
      - name: Install test dependencies
        run: |
          uv venv .venv --python 3.11
          uv pip install --python .venv/bin/python -r requirements.txt
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir frontend exec playwright install --with-deps chromium
      - name: Create ephemeral runtime and Compose env
        run: |
          compose_env="$RUNNER_TEMP/agent-gov-live.env"
          cp docker/.env.example "$compose_env"
          mkdir -p "$HOST_RUNTIME_VOLUME_ROOT"
          printf 'COMPOSE_ENV_FILE=%s\n' "$compose_env" >> "$GITHUB_ENV"
      - name: Build and start real container stack
        run: |
          trap 'make down COMPOSE_ENV_FILE="$COMPOSE_ENV_FILE"' EXIT
          make build COMPOSE_ENV_FILE="$COMPOSE_ENV_FILE"
          make up COMPOSE_ENV_FILE="$COMPOSE_ENV_FILE"
          make container-live-test COMPOSE_ENV_FILE="$COMPOSE_ENV_FILE"
          RUNTIME_UI_BASE=http://localhost:55173 \
          RUNTIME_API_BASE=http://localhost:58080 \
          RUNTIME_API_KEY="$API_KEY" \
          pnpm --dir frontend run verify:openai-responses-container
      - name: Upload live UI evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-live-${{ github.run_attempt }}
          path: artifacts/test-quality/release-live
          if-no-files-found: warn
          retention-days: 30
