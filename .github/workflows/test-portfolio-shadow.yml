name: test-portfolio-shadow

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/

jobs:
  serial-sentinel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          uv pip install --python .venv/bin/python -r requirements.txt
      - name: Serial full sentinel
        run: |
          .venv/bin/python scripts/run_test_lane.py \
            --policy tests/quality_policy.json \
            --lane main-full \
            --artifact-dir artifacts/test-quality/serial
      - name: Upload serial evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: shadow-serial-${{ github.run_attempt }}
          path: artifacts/test-quality/serial
          if-no-files-found: error
          retention-days: 30

  parallel-shadow:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workers: [2, 4]
        scheduler: [load, worksteal]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          uv pip install --python .venv/bin/python -r requirements.txt
      - name: Parallel full shadow
        run: |
          .venv/bin/python scripts/run_test_lane.py \
            --policy tests/quality_policy.json \
            --lane main-full \
            --artifact-dir artifacts/test-quality/parallel \
            --workers ${{ matrix.workers }} \
            --scheduler ${{ matrix.scheduler }}
      - name: Upload parallel evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: shadow-n${{ matrix.workers }}-${{ matrix.scheduler }}-${{ github.run_attempt }}
          path: artifacts/test-quality/parallel
          if-no-files-found: error
          retention-days: 30

  tia-shadow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          uv pip install --python .venv/bin/python -r requirements.txt
      - name: Select impacted tests
        run: |
          .venv/bin/python scripts/select_impacted_tests.py \
            --base-ref HEAD^ \
            --output artifacts/test-quality/tia/selection.json
      - name: Run TIA shadow
        run: |
          .venv/bin/python scripts/run_test_lane.py \
            --policy tests/quality_policy.json \
            --lane pr-fast \
            --selection-file artifacts/test-quality/tia/selection.json \
            --artifact-dir artifacts/test-quality/tia \
            --skip-coverage-threshold
      - name: Upload TIA evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: shadow-tia-${{ github.run_attempt }}
          path: artifacts/test-quality/tia
          if-no-files-found: error
          retention-days: 30

  compare-shadow:
    if: always()
    needs:
      - serial-sentinel
      - parallel-shadow
      - tia-shadow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install evidence validator
        run: python -m pip install --disable-pip-version-check pydantic==2.12.5
      - uses: actions/download-artifact@v8
        with:
          name: shadow-serial-${{ github.run_attempt }}
          path: artifacts/shadow/serial
      - uses: actions/download-artifact@v8
        with:
          pattern: shadow-n*-${{ github.run_attempt }}
          path: artifacts/shadow/candidates
      - uses: actions/download-artifact@v8
        with:
          name: shadow-tia-${{ github.run_attempt }}
          path: artifacts/shadow/tia
      - name: Compare same-SHA evidence
        run: |
          mapfile -t candidates < <(find artifacts/shadow/candidates -mindepth 1 -maxdepth 1 -type d | sort)
          args=()
          for candidate in "${candidates[@]}"; do args+=(--candidate-dir "$candidate"); done
          python scripts/compare_test_shadow_evidence.py \
            --serial-dir artifacts/shadow/serial \
            --tia-dir artifacts/shadow/tia \
            "${args[@]}" \
            --output artifacts/shadow/report/shadow-report.json
      - name: Upload paired shadow report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: shadow-report-${{ github.run_attempt }}
          path: artifacts/shadow/report
          if-no-files-found: error
          retention-days: 30
