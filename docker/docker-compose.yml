name: claude-agent-runtime

services:
  claude-agent-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
        APT_MIRROR: ${APT_MIRROR:-https://mirrors.aliyun.com/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    image: claude-agent-runtime-api:0.1.0
    container_name: claude-agent-runtime-api
    ports:
      - "${HOST_PORT:-58080}:${API_PORT:-8080}"
    env_file:
      - .env
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8080}
      HOST_PORT: ${HOST_PORT:-58080}
      HOST_WORKSPACE_MOUNT: ${HOST_WORKSPACE_MOUNT:-./volume/workspace}
      HOST_DATA_MOUNT: ${HOST_DATA_MOUNT:-./volume/data}
      HOST_CLAUDE_ROOT_MOUNT: ${HOST_CLAUDE_ROOT_MOUNT:-./volume/claude-root}
      WORKSPACE_DIR: ${WORKSPACE_DIR:-/workspace}
      DATA_DIR: ${DATA_DIR:-/data}
      CLAUDE_HOME: ${CLAUDE_HOME:-/root/.claude}
    volumes:
      - ${HOST_WORKSPACE_MOUNT:-./volume/workspace}:${WORKSPACE_DIR:-/workspace}
      - ${HOST_DATA_MOUNT:-./volume/data}:${DATA_DIR:-/data}
      - ${HOST_CLAUDE_ROOT_MOUNT:-./volume/claude-root}:/root
    restart: unless-stopped
