agent:
  id: security-operations-expert
  name: 网络安全运营专家智能体
  english_name: Security Operations Expert Agent
  version: 0.1.0
  language: zh-CN
  runtime: claude-code
  profile: security-operations-expert
  # 部署契约（被运行时读取+强制）：本 Agent 只连接 SOC 只读 MCP scope，
  # 只负责筛选、生成或修订完整剧本。唯一整本确认、SOC 保存/manual 执行（内含预检）和实例监控
  # 均由 response-orchestration lifecycle worker 负责，不使用 Agent 原生 Web HITL。
  requires_web_hitl: false

capabilities:
  - alert_triage
  - incident_investigation
  - threat_hunting
  - asset_account_context_enrichment
  - risk_prioritization
  - investigation_timeline_summary
  - containment_recommendation
  - response_case_intake
  - disposition_planning
  - playbook_resolution
  - playbook_dry_run

paths:
  workspace: /data/business-agents/security-operations-expert/workspace
  claude_home: /data/business-agents/security-operations-expert/claude-root/.claude
  data_root: /data
  sessions: /data/sessions
  transcripts: /data/transcripts
  uploads: /data/uploads
  outputs: /data/outputs
  agent_memory: /data/agent-memory

mcp:
  default_transport: http
  # .mcp.json 的 sec-ops server 只挂载 security-operations-expert 只读分组。
  servers:
    sec-ops:
      purpose: SOC 已有剧本、原子动作、资产和拓扑只读事实
      risk: read-only
      tool_families:
        - name: mcp__sec-ops__soc_api__*
          purpose: 只读剧本与原子动作目录；写操作不注册且由权限层拒绝
          risk: read-only
        - name: mcp__sec-ops__threat_analysis__*
          purpose: 研判数据只读
          risk: read-only

skills:
  security_operations_analysis: security-operations-analysis
  response_disposition: threat-response-disposition
  response_dry_run: playbook-dry-run

subagents:
  disposition_planning: response-playbook-planning
  playbook_build: response-playbook-builder

operational_model:
  evidence_first: true
  distinguish_fact_inference_action: true
  default_output_dir: /data/outputs/security-operations-expert
  investigation_scopes:
    - alert
    - incident
    - asset
    - account
    - identity
    - endpoint
    - network
    - cloud
    - vulnerability

approval_policy:
  owner: response-orchestration
  phase_field: phase
  proposal_phase: proposal
  whole_playbook_only: true
  user_confirmation_count: 1
  execution_owner: response-orchestration-lifecycle
  agent_soc_side_effects: deny
  native_web_hitl_role: disabled
  native_web_hitl_tools: []
  proposal_side_effects: deny
  forbidden_tools:
    - mcp__sec-ops__soc_api__create*
    - mcp__sec-ops__soc_api__manual
    - mcp__sec-ops__soc_api__execute
    - mcp__sec-ops__soc_api__post_*
    - mcp__sec-ops__soc_api__put_*
    - mcp__sec-ops__soc_api__delete_*
    - mcp__sec-ops__soc_api__patch_*
    - mcp__sec-ops__soc_api__create_1
    - mcp__sec-ops__soc_api__update*
    - mcp__sec-ops__soc_api__delete*
    - mcp__sec-ops__soc_api__upload*
    - mcp__sec-ops__soc_api__cancel*
    - mcp__sec-ops__soc_api__rollback
  lifecycle_worker_owns_save_and_execute: true
  poll_execution_result: false
  evaluate_effect: false
  close_response_case: false

observability:
  hook_audit_log: /data/transcripts/claude-hook-audit.jsonl
  output_dir: /data/outputs/security-operations-expert
  response_case_dir: /data/outputs/security-operations-expert/response

extension_points:
  add_mcp_server: .mcp.json
  add_skill: .claude/skills/<skill-name>/SKILL.md
  add_subagent: .claude/agents/<agent-name>.md
  add_command: .claude/commands/<command-name>.md
  add_rule: .claude/rules/<rule-name>.md

conversation_revision_policy:
  owner: response-orchestration
  mode: same-agent-conversation
  context_tool: mcp__sec-ops__response_orchestration_agent_tools__get_case_revision_context_api_v1_agent_tools_cases_case_id_context_get
  revision_tool: mcp__sec-ops__response_orchestration_agent_tools__request_case_revision_api_v1_agent_tools_cases_case_id_revisions_post
  require_explicit_user_acceptance: true
  stable_message_provenance_required: true
  trusted_actor_source: ai-console-proof
  creates_new_whole_playbook_approval: true
  soc_preflight_mode: embedded-in-execution-api
  soc_execution_side_effects: deny
