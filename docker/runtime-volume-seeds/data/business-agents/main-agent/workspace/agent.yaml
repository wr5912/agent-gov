agent:
  id: ai-secops-operator
  name: AI智能化网络安全运营智能体
  version: 0.1.0
  language: zh-CN
  runtime: claude-code
  profile: main-agent

capabilities:
  - data_query_statistics
  - alert_triage
  - threat_hunting
  - incident_response_planning
  - policy_change_planning
  - security_knowledge_retrieval
  - report_generation
  - ocsf_stix_threat_modeling

paths:
  # 以下路径均以 workspace 为基准，容器与本机调试使用同一份 seed。
  workspace: .
  claude_home: ../claude-root/.claude
  data_root: ../../..
  sessions: ../../../sessions
  transcripts: ../../../transcripts
  uploads: ../../../uploads
  outputs: ../../../outputs
  agent_memory: ../../../agent-memory

mcp:
  default_transport: http
  servers:
    sec-ops-data:
      purpose: 通过网络安全运营模拟数据 MCP 服务查询告警、资产、事件、漏洞、IOC、事件单和仪表盘统计
      risk: read-only

subagents:
  alert_triage: soc-analyst
  threat_hunting: threat-hunter
  incident_response: incident-responder
  detection_rule: detection-engineer
  policy_change: policy-operator
  report: report-writer
  knowledge: knowledge-curator

approval_policy:
  require_confirmation:
    - isolate_host
    - disable_user
    - block_ip
    - block_domain
    - block_hash
    - kill_process
    - delete_file
    - update_production_policy
    - deploy_detection_rule
  always_dry_run_first: true
  require_rollback_plan: true
  require_evidence: true

observability:
  hook_audit_log: ../../../transcripts/claude-hook-audit.jsonl
  response_plan_dir: ../../../outputs/response-plans
  report_dir: ../../../outputs/reports

extension_points:
  add_mcp_server: .mcp.json
  add_skill: .claude/skills/<skill-name>/SKILL.md
  add_subagent: .claude/agents/<agent-name>.md
  add_command: .claude/commands/<command-name>.md
  add_rule: .claude/rules/<rule-name>.md
