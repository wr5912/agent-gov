agent:
  id: response-disposal
  name: 响应处置智能体
  version: 0.1.0
  language: zh-CN
  runtime: claude-code
  profile: response-disposal
  # 部署契约（被运行时读取+强制）：剧本执行/入库（settings ask 层的
  # mcp__soc-playbook-execution__* / mcp__soc-playbook-registry__*）依赖 web HITL 人审。
  # ENABLE_CLAUDE_WEB_HITL=false 时运行时对这些 ask 型工具 fail-loud（流式明确报错、非流式不再 bypass 静默放行），
  # 且启动会告警。真正的执行处置须在开启 HITL 的交互式会话进行。
  requires_web_hitl: true

capabilities:
  - response_case_intake
  - disposition_planning
  - playbook_resolution
  - playbook_dry_run
  - playbook_execution_submission
  - execution_result_query
  - effect_evaluation
  - analyst_summary

paths:
  workspace: /data/business-agents/response-disposal/workspace
  claude_home: /data/business-agents/response-disposal/claude-root/.claude
  data_root: /data
  sessions: /data/sessions
  transcripts: /data/transcripts
  uploads: /data/uploads
  outputs: /data/outputs
  agent_memory: /data/agent-memory

mcp:
  default_transport: http
  servers:
    sec-ops-data:
      purpose: 基础 SOC 数据（告警、资产、事件）查询
      risk: read-only
    soc-ops-query:
      purpose: 查询原子动作清单与详情（剧本步骤的积木）
      risk: read-only
    soc-playbook-query:
      purpose: 查询已发布剧本与推荐
      risk: read-only
    soc-playbook-execution:
      purpose: 提交整本剧本下发执行
      risk: write
    soc-playbook-execution-result-query:
      purpose: 按 execution_id 取执行状态与结果证据
      risk: read-only
    soc-playbook-registry:
      purpose: 临时剧本入库
      risk: write

subagents:
  disposition_planning: response-playbook-planning
  playbook_build: response-playbook-builder
  summary: response-playbook-summarizer

approval_policy:
  require_confirmation:
    - isolate_host
    - disable_user
    - block_ip
    - block_domain
    - block_hash
    - kill_process
    - delete_file
    - update_production_policy
    - submit_playbook_execution
    - register_playbook
  always_dry_run_first: true
  require_rollback_plan: true
  require_evidence: true
  max_batch_size: 5

observability:
  hook_audit_log: /data/transcripts/claude-hook-audit.jsonl
  response_case_dir: /data/outputs/response

extension_points:
  add_mcp_server: .mcp.json
  add_skill: .claude/skills/<skill-name>/SKILL.md
  add_subagent: .claude/agents/<agent-name>.md
  add_command: .claude/commands/<command-name>.md
  add_rule: .claude/rules/<rule-name>.md
