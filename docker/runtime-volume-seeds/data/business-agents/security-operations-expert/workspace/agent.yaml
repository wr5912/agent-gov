agent:
  id: security-operations-expert
  name: 网络安全运营专家智能体
  english_name: Security Operations Expert Agent
  version: 0.1.0
  language: zh-CN
  runtime: claude-code
  profile: security-operations-expert

capabilities:
  - alert_triage
  - incident_investigation
  - threat_hunting
  - asset_account_context_enrichment
  - risk_prioritization
  - investigation_timeline_summary
  - containment_recommendation
  - response_case_intake
  - disposition_planning
  - playbook_resolution
  - playbook_dry_run
  - playbook_execution_submission
  - execution_result_query
  - effect_evaluation
  - analyst_summary

paths:
  workspace: /data/business-agents/security-operations-expert/workspace
  claude_home: /data/business-agents/security-operations-expert/claude-root/.claude
  data_root: /data
  sessions: /data/sessions
  transcripts: /data/transcripts
  uploads: /data/uploads
  outputs: /data/outputs
  agent_memory: /data/agent-memory

mcp:
  default_transport: http
  servers:
    sec-ops-data:
      purpose: 基础 SOC 数据（告警、资产、事件、日志摘要）查询
      risk: read-only
    soc-ops-query:
      purpose: 查询原子动作清单与详情（剧本步骤的积木）
      risk: read-only
    soc-playbook-query:
      purpose: 查询已发布剧本与推荐
      risk: read-only
    soc-playbook-execution:
      purpose: 提交整本剧本下发执行
      risk: write
    soc-playbook-execution-result-query:
      purpose: 按 execution_id 取执行状态与结果证据
      risk: read-only
    soc-playbook-registry:
      purpose: 临时剧本入库
      risk: write

skills:
  security_operations_analysis: security-operations-analysis
  response_disposition: threat-response-disposition
  response_dry_run: playbook-dry-run

subagents:
  disposition_planning: response-playbook-planning
  playbook_build: response-playbook-builder
  summary: response-playbook-summarizer

operational_model:
  evidence_first: true
  distinguish_fact_inference_action: true
  default_output_dir: /data/outputs/security-operations-expert
  investigation_scopes:
    - alert
    - incident
    - asset
    - account
    - identity
    - endpoint
    - network
    - cloud
    - vulnerability

approval_policy:
  require_confirmation:
    - isolate_host
    - disable_user
    - block_ip
    - block_domain
    - block_hash
    - kill_process
    - delete_file
    - update_production_policy
    - submit_playbook_execution
    - register_playbook
  always_dry_run_first: true
  require_rollback_plan: true
  require_evidence: true
  max_batch_size: 5

observability:
  hook_audit_log: /data/transcripts/claude-hook-audit.jsonl
  output_dir: /data/outputs/security-operations-expert
  response_case_dir: /data/outputs/security-operations-expert/response

extension_points:
  add_mcp_server: .mcp.json
  add_skill: .claude/skills/<skill-name>/SKILL.md
  add_subagent: .claude/agents/<agent-name>.md
  add_command: .claude/commands/<command-name>.md
  add_rule: .claude/rules/<rule-name>.md
