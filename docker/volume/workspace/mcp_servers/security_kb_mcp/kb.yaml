items:
  - id: SOP-ALERT-RUNDLL32-NETWORK
    title: Rundll32 异常网络连接研判 SOP
    type: sop
    tags: [rundll32, lolbin, network, T1218.011]
    updated_at: 2026-05-09
    content: |
      1. 确认 rundll32.exe 路径是否为系统路径。
      2. 检查命令行加载 DLL、导出函数和父进程。
      3. 查询同主机近 24 小时父子进程链、网络连接和文件落地。
      4. 若目标 IP/域名无业务归属且父进程异常，升级为高危。
      5. 处置前先确认业务影响；优先隔离进程/阻断 IOC，必要时隔离主机。
  - id: SOP-POWERSHELL-ENCODED
    title: PowerShell EncodedCommand 研判 SOP
    type: sop
    tags: [powershell, encodedcommand, T1059.001]
    updated_at: 2026-05-09
    content: |
      1. 解码 EncodedCommand，并进行脱敏。
      2. 检查父进程、执行用户、执行目录和脚本来源。
      3. 查询是否存在下载执行、持久化、凭据访问和横向移动行为。
      4. 对服务器资产上的异常 PowerShell 默认提升一个风险等级。
  - id: REPORT-INCIDENT-TEMPLATE-GUIDE
    title: 安全事件报告写作要求
    type: report-guide
    tags: [report, incident]
    updated_at: 2026-05-09
    content: |
      事件报告必须包含：摘要、影响范围、时间线、根因、处置过程、当前状态、改进项。
