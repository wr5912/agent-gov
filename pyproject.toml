[tool.ruff]
target-version = "py311"
line-length = 160
src = [
  "app",
  "scripts",
  "tests",
  "packages/agentgov-testkit/src",
  "docker/runtime-bootstrap/governor-workspace/tests",
]
extend-exclude = [
  ".venv",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  "docker/volume",
  "frontend/node_modules",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
  "E501",
  "UP017",
  "UP041",
  "UP045",
  "SIM102",
  "SIM108",
  "SIM117",
]

[tool.ruff.lint.per-file-ignores]
"app/runtime/agent_job_types.py" = ["E402", "I001"]
"app/runtime/output_formatter.py" = ["E402", "I001"]

[tool.coverage.run]
branch = true
source = ["app", "scripts"]

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = true
exclude_also = [
  "if TYPE_CHECKING:",
  "if __name__ == .__main__.:",
]

[tool.coverage.json]
pretty_print = true

[tool.mutmut]
source_paths = ["app/runtime"]
only_mutate = ["app/runtime/state_machines.py"]
pytest_add_cli_args_test_selection = ["tests/test_state_machines.py"]
mutate_only_covered_lines = true
timeout_multiplier = 8.0
timeout_constant = 1.0
